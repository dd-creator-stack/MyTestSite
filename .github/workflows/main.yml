name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:

  # BUILD
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build site
        run: |
          mkdir -p dist/staging

          echo "<h1>PRODUCTION SITE</h1>" > dist/index.html
          echo "<h1>STAGING SITE</h1>" > dist/staging/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  # ✅ STAGING DEPLOY (runs automatically)
  deploy-staging:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: staging

    steps:
      - name: Deploy to staging
        uses: actions/deploy-pages@v4

  # ✅ PRODUCTION DEPLOY (requires approval)
  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest

    environment:
      name: github-pages   # approval enabled here

    steps:
      - name: Deploy to production
        uses: actions/deploy-pages@v4
