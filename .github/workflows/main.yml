name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]          # Deploy only on main
  pull_request:
    branches: [ "main" ]          # Build + test before merge

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # -----------------------
  # BUILD + TEST (CI)
  # -----------------------
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build site
        run: |
          echo "Building site..."
          # Future: npm run build

      - name: Run tests
        run: |
          echo "Running tests..."
          exit 1
          # Future: npm test OR lint checks

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  # -----------------------
  # DEPLOY (CD)
  # -----------------------
  deploy:
    if: github.event_name == 'push'   # 👈 Only deploy on push (not PR)
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
