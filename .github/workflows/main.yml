name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "staging" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:

  # -----------------------
  # BUILD + TEST
  # -----------------------
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build site
        run: |
          mkdir dist
          echo "<h1>My Site</h1>" > dist/index.html

      - name: Run tests
        run: echo "Running tests..."

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  # -----------------------
  # STAGING DEPLOY
  # -----------------------
  deploy-staging:
    if: github.ref == 'refs/heads/staging'
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: staging

    steps:
      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment"
