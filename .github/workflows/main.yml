name: Deploy Website

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # -----------------------
  # BUILD STAGE
  # -----------------------
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build site
        run: |
          echo "Simulating build step"
          # In future: npm run build OR generate static files

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  # -----------------------
  # DEPLOY STAGE
  # -----------------------
  deploy:
    needs: build   # 👈 This is key
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
